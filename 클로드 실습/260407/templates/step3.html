<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 프로필</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f7fa; min-height: 100vh; display: flex; justify-content: center; padding: 40px 16px; }
    .container { width: 100%; max-width: 640px; }

    /* ── 인증 화면 ── */
    .auth-box { background: #fff; border-radius: 20px; padding: 40px 32px; border: 1px solid #e8e8e8; }
    .auth-box h1 { font-size: 1.5rem; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }
    .auth-box p { color: #888; margin-bottom: 28px; font-size: 0.9rem; }
    .tab-row { display: flex; gap: 0; border-bottom: 2px solid #f0f0f0; margin-bottom: 24px; }
    .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 0.95rem; color: #aaa; border-bottom: 2px solid transparent; margin-bottom: -2px; }
    .tab.active { color: #4f8ef7; border-bottom-color: #4f8ef7; font-weight: 600; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.82rem; color: #666; margin-bottom: 6px; }
    .form-group input { width: 100%; border: 1px solid #d0d0d0; border-radius: 10px; padding: 10px 14px; font-size: 0.95rem; outline: none; }
    .form-group input:focus { border-color: #4f8ef7; }
    .btn-primary { width: 100%; padding: 13px; background: #1a1a2e; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 4px; }
    .btn-primary:hover { background: #2d2d4e; }
    .auth-error { color: #e53e3e; font-size: 0.85rem; margin-top: 10px; display: none; }

    /* ── 프로필 화면 ── */
    .profile-page { display: none; }

    .profile-header { background: linear-gradient(135deg, #1a1a2e, #2d2d4e); border-radius: 20px; padding: 28px 28px 24px; color: #fff; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-start; }
    .profile-avatar { width: 52px; height: 52px; border-radius: 50%; background: #4f8ef7; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 700; margin-bottom: 12px; }
    .profile-name { font-size: 1.2rem; font-weight: 700; }
    .profile-email { font-size: 0.85rem; color: #aaa; margin-top: 3px; }
    .btn-logout { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 0.82rem; }
    .btn-logout:hover { background: rgba(255,255,255,0.2); }

    /* 식이 제한 */
    .section-card { background: #fff; border-radius: 16px; padding: 20px 24px; border: 1px solid #e8e8e8; margin-bottom: 20px; }
    .section-card h2 { font-size: 1rem; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
    .section-card .hint { font-size: 0.8rem; color: #aaa; margin-bottom: 16px; }

    .diet-options { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .diet-chip { padding: 7px 16px; border-radius: 20px; border: 1.5px solid #d0d0d0; background: #fff; color: #555; font-size: 0.85rem; cursor: pointer; transition: all 0.15s; }
    .diet-chip.selected { border-color: #4f8ef7; background: #e8f0fe; color: #1a56db; font-weight: 600; }
    .btn-save-diet { padding: 8px 20px; background: #4f8ef7; color: #fff; border: none; border-radius: 8px; font-size: 0.85rem; cursor: pointer; }
    .save-confirm { font-size: 0.8rem; color: #059669; margin-left: 10px; display: none; }

    /* 레시피 보관함 */
    .recipe-list { display: flex; flex-direction: column; gap: 12px; }
    .recipe-card { background: #fff; border-radius: 14px; border: 1px solid #e8e8e8; overflow: hidden; }
    .card-header { padding: 16px 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: flex-start; }
    .card-header:hover { background: #fafafa; }
    .card-title { font-size: 1rem; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }
    .card-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .badge { font-size: 0.75rem; padding: 2px 9px; border-radius: 20px; }
    .badge-difficulty-쉬움 { background: #d1fae5; color: #065f46; }
    .badge-difficulty-보통 { background: #fef3c7; color: #92400e; }
    .badge-difficulty-어려움 { background: #fee2e2; color: #991b1b; }
    .badge-difficulty- { background: #f3f4f6; color: #555; }
    .badge-time { background: #ede9fe; color: #5b21b6; }
    .badge-date { font-size: 0.75rem; color: #bbb; }
    .card-actions { display: flex; gap: 6px; flex-shrink: 0; margin-left: 8px; }
    .btn-icon { background: none; border: none; cursor: pointer; font-size: 1.1rem; color: #aaa; padding: 2px; }
    .btn-icon:hover { color: #e53e3e; }
    .toggle-icon { font-size: 1rem; color: #aaa; transition: transform 0.2s; }
    .recipe-card.open .toggle-icon { transform: rotate(180deg); }

    .card-body { display: none; padding: 0 18px 18px; border-top: 1px solid #f0f0f0; }
    .recipe-card.open .card-body { display: block; }

    .section-label { font-size: 0.78rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin: 12px 0 6px; }
    .steps-list { display: flex; flex-direction: column; gap: 8px; }
    .step-item { display: flex; gap: 8px; align-items: flex-start; }
    .step-num { background: #4f8ef7; color: #fff; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
    .step-text { font-size: 0.88rem; color: #333; line-height: 1.5; }

    /* 메모 */
    .memo-area { margin-top: 12px; }
    .memo-input { width: 100%; border: 1px solid #e0e0e0; border-radius: 8px; padding: 8px 12px; font-size: 0.85rem; resize: none; outline: none; font-family: inherit; }
    .memo-input:focus { border-color: #4f8ef7; }
    .btn-save-memo { margin-top: 6px; padding: 6px 14px; background: #f0f0f0; color: #555; border: none; border-radius: 7px; font-size: 0.82rem; cursor: pointer; }
    .btn-save-memo:hover { background: #e0e0e0; }

    .empty-vault { text-align: center; color: #bbb; padding: 40px 0; font-size: 0.95rem; }

    /* 하단 버튼 */
    .btn-new-analysis { display: block; width: 100%; margin-top: 24px; padding: 14px; background: #4f8ef7; color: #fff; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-new-analysis:hover { background: #3a7de0; }
  </style>
</head>
<body>
<div class="container">

  <!-- ── 인증 화면 ── -->
  <div id="authPage">
    <div class="auth-box">
      <h1>👤 내 프로필</h1>
      <p>로그인하면 레시피를 저장하고 관리할 수 있어요.</p>
      <div class="tab-row">
        <div class="tab active" onclick="switchTab('login')">로그인</div>
        <div class="tab" onclick="switchTab('signup')">회원가입</div>
      </div>

      <!-- 로그인 폼 -->
      <div id="loginForm">
        <div class="form-group"><label>이메일</label><input type="email" id="loginEmail" placeholder="email@example.com"></div>
        <div class="form-group"><label>비밀번호</label><input type="password" id="loginPw" placeholder="비밀번호"></div>
        <button class="btn-primary" onclick="login()">로그인</button>
        <p class="auth-error" id="loginError"></p>
      </div>

      <!-- 회원가입 폼 -->
      <div id="signupForm" style="display:none;">
        <div class="form-group"><label>닉네임</label><input type="text" id="signupNick" placeholder="닉네임"></div>
        <div class="form-group"><label>이메일</label><input type="email" id="signupEmail" placeholder="email@example.com"></div>
        <div class="form-group"><label>비밀번호</label><input type="password" id="signupPw" placeholder="비밀번호 (6자 이상)"></div>
        <button class="btn-primary" onclick="signup()">회원가입</button>
        <p class="auth-error" id="signupError"></p>
      </div>
    </div>
  </div>

  <!-- ── 프로필 화면 ── -->
  <div class="profile-page" id="profilePage">

    <!-- 헤더 -->
    <div class="profile-header">
      <div>
        <div class="profile-avatar" id="profileAvatar"></div>
        <div class="profile-name" id="profileName"></div>
        <div class="profile-email" id="profileEmail"></div>
      </div>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>

    <!-- 식이 제한 설정 -->
    <div class="section-card">
      <h2>식이 제한 설정</h2>
      <p class="hint">선택한 항목이 레시피 생성 시 자동으로 반영돼요.</p>
      <div class="diet-options">
        <div class="diet-chip" data-value="채식">🌿 채식</div>
        <div class="diet-chip" data-value="비건">🥦 비건</div>
        <div class="diet-chip" data-value="글루텐 프리">🌾 글루텐 프리</div>
        <div class="diet-chip" data-value="유제품 제외">🥛 유제품 제외</div>
        <div class="diet-chip" data-value="견과류 제외">🥜 견과류 제외</div>
        <div class="diet-chip" data-value="해산물 제외">🦐 해산물 제외</div>
      </div>
      <button class="btn-save-diet" onclick="saveDiet()">저장</button>
      <span class="save-confirm" id="dietConfirm">저장됐어요 ✓</span>
    </div>

    <!-- 레시피 보관함 -->
    <div class="section-card">
      <h2>레시피 보관함</h2>
      <p class="hint" id="recipeCount"></p>
      <div class="recipe-list" id="recipeList"></div>
      <div class="empty-vault" id="emptyVault" style="display:none;">저장된 레시피가 없어요.<br>Step 2에서 마음에 드는 레시피를 저장해보세요!</div>
    </div>

    <button class="btn-new-analysis" onclick="window.location.href='/'">🧊 냉장고 다시 분석하기</button>
  </div>

</div>

<script>
  const DIET_OPTIONS = ['채식', '비건', '글루텐 프리', '유제품 제외', '견과류 제외', '해산물 제외'];

  // ── 초기화 ──
  function init() {
    const user = getUser();
    if (user) showProfile(user);
    else showAuth();
  }

  function getUser() { return JSON.parse(localStorage.getItem('user') || 'null'); }
  function getAccounts() { return JSON.parse(localStorage.getItem('accounts') || '{}'); }
  function getSavedRecipes() { return JSON.parse(localStorage.getItem('savedRecipes') || '[]'); }

  // ── 인증 ──
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')));
    document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
  }

  function signup() {
    const nick = document.getElementById('signupNick').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const pw = document.getElementById('signupPw').value;
    const err = document.getElementById('signupError');
    if (!nick || !email || !pw) { showErr(err, '모든 항목을 입력해주세요.'); return; }
    if (pw.length < 6) { showErr(err, '비밀번호는 6자 이상이어야 해요.'); return; }
    const accounts = getAccounts();
    if (accounts[email]) { showErr(err, '이미 가입된 이메일이에요.'); return; }
    accounts[email] = { nickname: nick, email, pw, dietaryRestrictions: [] };
    localStorage.setItem('accounts', JSON.stringify(accounts));
    loginAs(accounts[email]);
  }

  function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const pw = document.getElementById('loginPw').value;
    const err = document.getElementById('loginError');
    const accounts = getAccounts();
    if (!accounts[email] || accounts[email].pw !== pw) { showErr(err, '이메일 또는 비밀번호가 올바르지 않아요.'); return; }
    loginAs(accounts[email]);
  }

  function loginAs(account) {
    const user = { nickname: account.nickname, email: account.email, dietaryRestrictions: account.dietaryRestrictions || [] };
    localStorage.setItem('user', JSON.stringify(user));

    // 미로그인 상태에서 저장 시도한 레시피 처리
    const pending = localStorage.getItem('pendingRecipe');
    if (pending) {
      const recipe = JSON.parse(pending);
      const saved = getSavedRecipes();
      saved.push({ ...recipe, id: Date.now().toString(), savedAt: new Date().toISOString(), memo: '' });
      localStorage.setItem('savedRecipes', JSON.stringify(saved));
      localStorage.removeItem('pendingRecipe');
    }
    showProfile(user);
  }

  function logout() {
    localStorage.removeItem('user');
    showAuth();
  }

  function showAuth() {
    document.getElementById('authPage').style.display = 'block';
    document.getElementById('profilePage').style.display = 'none';
  }

  // ── 프로필 ──
  function showProfile(user) {
    document.getElementById('authPage').style.display = 'none';
    document.getElementById('profilePage').style.display = 'block';
    document.getElementById('profileAvatar').textContent = user.nickname[0].toUpperCase();
    document.getElementById('profileName').textContent = user.nickname;
    document.getElementById('profileEmail').textContent = user.email;
    renderDietChips(user.dietaryRestrictions || []);
    renderRecipes();
  }

  // ── 식이 제한 ──
  function renderDietChips(selected) {
    document.querySelectorAll('.diet-chip').forEach(chip => {
      chip.classList.toggle('selected', selected.includes(chip.dataset.value));
    });
  }

  document.querySelectorAll('.diet-chip').forEach(chip => {
    chip.addEventListener('click', () => chip.classList.toggle('selected'));
  });

  function saveDiet() {
    const selected = [...document.querySelectorAll('.diet-chip.selected')].map(c => c.dataset.value);
    const user = getUser();
    user.dietaryRestrictions = selected;
    localStorage.setItem('user', JSON.stringify(user));
    // accounts에도 동기화
    const accounts = getAccounts();
    if (accounts[user.email]) { accounts[user.email].dietaryRestrictions = selected; localStorage.setItem('accounts', JSON.stringify(accounts)); }
    const confirm = document.getElementById('dietConfirm');
    confirm.style.display = 'inline';
    setTimeout(() => confirm.style.display = 'none', 2000);
  }

  // ── 레시피 보관함 ──
  function renderRecipes() {
    const recipes = getSavedRecipes();
    const list = document.getElementById('recipeList');
    const empty = document.getElementById('emptyVault');
    const count = document.getElementById('recipeCount');
    count.textContent = `저장된 레시피 ${recipes.length}개`;

    if (recipes.length === 0) { list.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    list.innerHTML = '';

    recipes.slice().reverse().forEach((recipe, displayIdx) => {
      const realIdx = recipes.length - 1 - displayIdx;
      const date = new Date(recipe.savedAt).toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
      const card = document.createElement('div');
      card.className = 'recipe-card';
      card.id = `card-${recipe.id}`;
      card.innerHTML = `
        <div class="card-header" onclick="toggleCard('${recipe.id}')">
          <div style="flex:1">
            <div class="card-title">${recipe.name}</div>
            <div class="card-meta">
              <span class="badge badge-difficulty-${recipe.difficulty}">${recipe.difficulty}</span>
              <span class="badge badge-time">⏱ ${recipe.cook_time || recipe.cookingTime || '-'}</span>
              <span class="badge-date">${date}</span>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:4px">
            <button class="btn-icon" title="삭제" onclick="deleteRecipe(event,'${recipe.id}')">🗑️</button>
            <span class="toggle-icon">▼</span>
          </div>
        </div>
        <div class="card-body" id="body-${recipe.id}">
          <div class="section-label">조리 순서</div>
          <div class="steps-list">
            ${(recipe.steps || []).map((s, i) => `
              <div class="step-item">
                <div class="step-num">${i + 1}</div>
                <div class="step-text">${s}</div>
              </div>`).join('')}
          </div>
          <div class="memo-area">
            <div class="section-label">메모</div>
            <textarea class="memo-input" id="memo-${recipe.id}" rows="2" placeholder="메모를 남겨보세요...">${recipe.memo || ''}</textarea>
            <button class="btn-save-memo" onclick="saveMemo('${recipe.id}')">메모 저장</button>
          </div>
        </div>
      `;
      list.appendChild(card);
    });
  }

  function toggleCard(id) {
    const card = document.getElementById(`card-${id}`);
    card.classList.toggle('open');
  }

  function deleteRecipe(e, id) {
    e.stopPropagation();
    if (!confirm('이 레시피를 삭제할까요?')) return;
    const saved = getSavedRecipes().filter(r => r.id !== id);
    localStorage.setItem('savedRecipes', JSON.stringify(saved));
    renderRecipes();
  }

  function saveMemo(id) {
    const memo = document.getElementById(`memo-${id}`).value;
    const saved = getSavedRecipes().map(r => r.id === id ? { ...r, memo } : r);
    localStorage.setItem('savedRecipes', JSON.stringify(saved));
    const btn = event.target;
    btn.textContent = '저장됨 ✓';
    setTimeout(() => btn.textContent = '메모 저장', 1500);
  }

  function showErr(el, msg) { el.textContent = msg; el.style.display = 'block'; }

  init();
</script>
</body>
</html>
