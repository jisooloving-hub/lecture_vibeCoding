<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할 일 관리</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <!-- 헤더 -->
    <header>
      <div class="header-top">
        <h1>오늘의 할 일</h1>
        <button id="darkToggle" aria-label="다크모드 전환">🌙</button>
      </div>
      <div class="progress-wrapper">
        <div class="progress-text" id="progressText">0 / 0 완료 (0%)</div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressBarFill"></div>
        </div>
      </div>
    </header>

    <!-- 자동 분류 힌트 -->
    <div id="classifyHint" class="classify-hint"></div>

    <!-- 카테고리 필터 탭 -->
    <nav class="filter-tabs">
      <button class="tab active" data-filter="전체">전체</button>
      <button class="tab" data-filter="업무">업무</button>
      <button class="tab" data-filter="개인">개인</button>
      <button class="tab" data-filter="공부">공부</button>
    </nav>

    <!-- 입력 영역 -->
    <div class="input-area">
      <select id="categorySelect">
        <option value="업무">업무</option>
        <option value="개인">개인</option>
        <option value="공부">공부</option>
      </select>
      <input
        type="text"
        id="todoInput"
        placeholder="할 일을 입력하세요..."
        autocomplete="off"
      >
      <button id="addBtn">+</button>
    </div>

    <!-- 할 일 목록 -->
    <ul class="todo-list" id="todoList">
      <!-- renderTodos()가 동적으로 생성 -->
    </ul>

    <!-- 데이터 내보내기/가져오기 -->
    <div class="data-io">
      <button id="exportBtn">⬇ JSON 내보내기</button>
      <label id="importLabel" for="importFile">⬆ JSON 가져오기</label>
      <input type="file" id="importFile" accept=".json">
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
